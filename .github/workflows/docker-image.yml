name: Docker Build CI        # Workflow name (visible in UI)

on:                         # Trigger
  push:
    branches:
      - main                # Runs when code is pushed to main

jobs:
  build:
    runs-on: ubuntu-latest  # GitHub-hosted runner (VM)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Pulls repo code into runner
      - name: Update Stored Variable
        env:
          GH_TOKEN: ${{ secrets.TEST_DOCKER_REPO_PAT }}
        run: |
          # 1. Get current value
          CURRENT_VAL=$(gh variable get VERSION)
          # 2. Append new value
          NEW_VAL=$((MY_COUNT + 1))
          # 3. Add it to GITHUB_ENV
          echo "VERSION=$NEW_VAL" >> $GITHUB_ENV
          # 3. Update the variable in GitHub Settings
          gh variable set VERSION --body "$NEW_VAL"
          
      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        
      -  name: Set up QEMU
         uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: vivekananda2001/test_workflow:${{ env.VERSION }}
